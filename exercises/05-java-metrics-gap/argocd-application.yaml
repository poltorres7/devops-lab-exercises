apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: exercise-05-java-metrics-gap
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: exercise-05
  source:
    repoURL: REPLACE_WITH_GIT_REPO_URL
    targetRevision: HEAD
    path: exercises/05-java-metrics-gap/helm
    helm:
      releaseName: exercise-05
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

